services:
  airflow-postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  airflow-init:
    build:
      context: ..
      dockerfile: airflow/docker/Dockerfile
    env_file:
      - ../.env
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres:5432/airflow
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__FERNET_KEY: ""
      AIRFLOW__CORE__AUTH_MANAGER: "${AIRFLOW__CORE__AUTH_MANAGER:-airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager}"
      AIRFLOW__API__SECRET_KEY: "${AIRFLOW__API__SECRET_KEY:-change_me_airflow_api_secret}"
      AIRFLOW__API_AUTH__JWT_SECRET: "${AIRFLOW__API_AUTH__JWT_SECRET:-change_me_airflow_api_auth_jwt_secret}"
      AIRFLOW_UID: 50000
      PYTHONPATH: /opt/airflow/project
      AIRFLOW_ADMIN_USER: "${AIRFLOW_ADMIN_USER:-admin}"
      AIRFLOW_ADMIN_PASSWORD: "${AIRFLOW_ADMIN_PASSWORD:-admin}"
      AIRFLOW_ADMIN_EMAIL: "${AIRFLOW_ADMIN_EMAIL:-admin@example.com}"
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate && \
        if airflow users list | awk 'NR>2 {print $$2}' | grep -qx "$$AIRFLOW_ADMIN_USER"; then \
          airflow users reset-password \
            --username "$$AIRFLOW_ADMIN_USER" \
            --password "$$AIRFLOW_ADMIN_PASSWORD"; \
        else \
          airflow users create \
            --username "$$AIRFLOW_ADMIN_USER" \
            --password "$$AIRFLOW_ADMIN_PASSWORD" \
            --firstname Airflow \
            --lastname Admin \
            --role Admin \
            --email "$$AIRFLOW_ADMIN_EMAIL"; \
        fi
    volumes:
      - ../airflow/dags:/opt/airflow/dags
      - ../airflow/logs:/opt/airflow/logs
      - ../airflow/plugins:/opt/airflow/plugins
      - ..:/opt/airflow/project
    depends_on:
      airflow-postgres:
        condition: service_healthy

  airflow-apiserver:
    build:
      context: ..
      dockerfile: airflow/docker/Dockerfile
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres:5432/airflow
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__FERNET_KEY: ""
      AIRFLOW__CORE__AUTH_MANAGER: "${AIRFLOW__CORE__AUTH_MANAGER:-airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager}"
      AIRFLOW__API__SECRET_KEY: "${AIRFLOW__API__SECRET_KEY:-change_me_airflow_api_secret}"
      AIRFLOW__API_AUTH__JWT_SECRET: "${AIRFLOW__API_AUTH__JWT_SECRET:-change_me_airflow_api_auth_jwt_secret}"
      AIRFLOW_UID: 50000
      PYTHONPATH: /opt/airflow/project
    command: ["airflow", "api-server"]
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - ../airflow/dags:/opt/airflow/dags
      - ../airflow/logs:/opt/airflow/logs
      - ../airflow/plugins:/opt/airflow/plugins
      - ..:/opt/airflow/project
    depends_on:
      airflow-postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    build:
      context: ..
      dockerfile: airflow/docker/Dockerfile
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres:5432/airflow
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__FERNET_KEY: ""
      AIRFLOW__CORE__AUTH_MANAGER: "${AIRFLOW__CORE__AUTH_MANAGER:-airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager}"
      AIRFLOW__API__SECRET_KEY: "${AIRFLOW__API__SECRET_KEY:-change_me_airflow_api_secret}"
      AIRFLOW__API_AUTH__JWT_SECRET: "${AIRFLOW__API_AUTH__JWT_SECRET:-change_me_airflow_api_auth_jwt_secret}"
      AIRFLOW_UID: 50000
      PYTHONPATH: /opt/airflow/project
    command: ["airflow", "scheduler"]
    volumes:
      - ../airflow/dags:/opt/airflow/dags
      - ../airflow/logs:/opt/airflow/logs
      - ../airflow/plugins:/opt/airflow/plugins
      - ..:/opt/airflow/project
    depends_on:
      airflow-postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully

  airflow-dag-processor:
    build:
      context: ..
      dockerfile: airflow/docker/Dockerfile
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres:5432/airflow
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__FERNET_KEY: ""
      AIRFLOW__CORE__AUTH_MANAGER: "${AIRFLOW__CORE__AUTH_MANAGER:-airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager}"
      AIRFLOW__API__SECRET_KEY: "${AIRFLOW__API__SECRET_KEY:-change_me_airflow_api_secret}"
      AIRFLOW__API_AUTH__JWT_SECRET: "${AIRFLOW__API_AUTH__JWT_SECRET:-change_me_airflow_api_auth_jwt_secret}"
      AIRFLOW_UID: 50000
      PYTHONPATH: /opt/airflow/project
    command: ["airflow", "dag-processor"]
    volumes:
      - ../airflow/dags:/opt/airflow/dags
      - ../airflow/logs:/opt/airflow/logs
      - ../airflow/plugins:/opt/airflow/plugins
      - ..:/opt/airflow/project
    depends_on:
      airflow-postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully

volumes:
  airflow_postgres_data:
