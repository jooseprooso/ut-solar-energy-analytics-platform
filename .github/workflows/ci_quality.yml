name: ci_quality

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  quality_gates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Ruff check
        run: ruff check .

      - name: Run test suite
        run: pytest
