apiVersion: 1

datasources:
  - name: Supabase PostgreSQL
    uid: supabase_postgres
    type: postgres
    access: proxy
    url: ${SUPABASE_DB_HOST}:${SUPABASE_DB_PORT}
    user: ${SUPABASE_DB_USER}
    secureJsonData:
      password: ${SUPABASE_DB_PASSWORD}
    jsonData:
      database: ${SUPABASE_DB_NAME}
      sslmode: ${GRAFANA_SUPABASE_SSLMODE}
      postgresVersion: 1500
      timescaledb: false
    isDefault: true
    editable: false
